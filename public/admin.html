<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Helicópteros</title>
</head>
<body>

<h1>Panel Admin</h1>

<div class="formulario">
  <input type="text" id="marca" placeholder="Marca">
  <input type="text" id="modelo" placeholder="Modelo">
  <input type="number" id="anio" placeholder="Año">
  <input type="number" id="precio" placeholder="Precio">
  <label>
    Disponible
    <input type="checkbox" id="disponible" checked>
  </label>

  <!-- 🔥 BOTÓN CORREGIDO -->
  <button onclick="agregarHelicoptero()">Agregar</button>
</div>

<h2>Lista de Helicópteros</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Marca</th>
      <th>Modelo</th>
      <th>Año</th>
      <th>Precio</th>
      <th>Disponible</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tabla-helicopteros"></tbody>
</table>

<!-- 🔥 IMPORTANTE: SCRIPT -->
<script src="script.js"></script>

</body>
</html>
